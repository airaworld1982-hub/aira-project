# ═══════════════════════════════════════════════════════════
# Nginx Configuration — AIRA airaworld.org
# Save to: /etc/nginx/sites-available/aira
# Then: sudo ln -s /etc/nginx/sites-available/aira /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx
# ═══════════════════════════════════════════════════════════

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name airaworld.org www.airaworld.org;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://www.airaworld.org$request_uri;
    }
}

# Redirect non-www → www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name airaworld.org;

    ssl_certificate     /etc/letsencrypt/live/airaworld.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/airaworld.org/privkey.pem;

    return 301 https://www.airaworld.org$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.airaworld.org;

    # SSL Certificates (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/airaworld.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/airaworld.org/privkey.pem;

    # SSL Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Logs
    access_log /var/log/nginx/aira-access.log;
    error_log  /var/log/nginx/aira-error.log;

    # Max upload size (for base64 images)
    client_max_body_size 30M;

    # ── API → Node.js proxy ──────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Pusher auth proxy ────────────────────────────────────
    location /api/pusher-auth {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Static Frontend Files ────────────────────────────────
    root /var/www/aira/frontend;
    index index.html;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # SPA fallback — all routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
        access_log off;
    }

    # Block .env files
    location ~ /\.env {
        deny all;
    }
}
